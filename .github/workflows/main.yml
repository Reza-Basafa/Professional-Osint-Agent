name: SAT-TRACK OSINT OVERWATCH

on:
  workflow_dispatch:
    inputs:
      satellite_target:
        description: 'Target: ISS / NOAA_19 / TIANGONG'
        required: true
        default: 'ISS'
      ground_station_location:
        description: 'Enter Ground Station Coordinates or City'
        required: true
        default: 'Kerman, IR (30.294 N, 57.068 E)'

jobs:
  telemetry_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Generation Dependencies
      run: |
        python -m pip install --upgrade pip
        # نصب پکیج‌های استاندارد و پایدار شبکه و تولید سند
        pip install requests fpdf2

    - name: Execute Satellite Telemetry & Render PDF
      run: |
        # ایجاد دایرکتوری مطلق برای ذخیره سند نهایی
        mkdir -p ${{ github.workspace }}/sat_output
        
        cat << 'EOF' > sat_processor.py
        import sys
        import datetime
        from fpdf import FPDF

        target = "${{ github.event.inputs.satellite_target }}"
        location = "${{ github.event.inputs.ground_station_location }}"
        current_time = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")

        class SatReport(FPDF):
            def header(self):
                # طراحی هدر دارک و سایبرپانکی سند
                self.set_fill_color(11, 15, 25) # رنگ پس‌زمینه تیره
                self.rect(0, 0, 210, 297, "F")
                
                self.set_draw_color(0, 255, 102) # خطوط سبز فسفری
                self.set_line_width(0.8)
                self.rect(10, 10, 190, 35)
                
                self.set_xy(15, 15)
                self.set_font("Courier", "B", 16)
                self.set_text_color(0, 255, 102)
                self.cell(0, 10, "SAT-TRACK OSINT INTELLIGENCE OVERWATCH", ln=1)
                
                self.set_font("Courier", "I", 9)
                self.set_text_color(137, 180, 250)
                self.set_x(15)
                self.cell(0, 5, "AUTOMATED SATELLITE PASS & SIGNAL TELEMETRY REPORT", ln=1)

            def footer(self):
                # طراحی فوتر هکری
                self.set_y(-15)
                self.set_font("Courier", "B", 8)
                self.set_text_color(74, 93, 120)
                self.cell(100, 10, "NEXUS SAT-TRACK // CLASSIFIED OSINT DATA", 0, 0, "L")
                self.cell(90, 10, f"Page {self.page_no()}", 0, 0, "R")

        # ساخت و پیکربندی PDF
        pdf = SatReport()
        pdf.add_page()
        pdf.ln(20)

        # جدول اطلاعات پایه (Metadata Grid)
        pdf.set_font("Courier", "B", 10)
        pdf.set_text_color(245, 224, 220)
        pdf.cell(95, 8, f"TARGET SATELLITE: {target}", ln=0)
        pdf.cell(95, 8, f"SCAN TIMESTAMP: {current_time}", ln=1)
        pdf.cell(95, 8, f"GROUND STATION:  {location}", ln=0)
        pdf.cell(95, 8, "CORE VERSION:    NEXUS V1.0", ln=1)
        
        pdf.ln(5)
        pdf.set_draw_color(49, 50, 68)
        pdf.line(10, 75, 200, 75)
        pdf.ln(5)

        # بخش اول: آنالیز وکتورها
        pdf.set_font("Courier", "B", 12)
        pdf.set_text_color(0, 255, 102)
        pdf.cell(0, 10, "1. Orbit & Telemetry Vector Analysis", ln=1)
        
        pdf.set_font("Courier", size=10)
        pdf.set_text_color(186, 194, 222)
        analysis_text = (
            "The ground intelligence station successfully locked into the target tracking beacon. "
            "The mathematical telemetry propagation has resolved the current spatial state vector "
            "with extreme precision using passive SGP4 data grids."
        )
        pdf.multi_cell(0, 6, analysis_text)
        pdf.ln(5)

        # لود کردن دیتاهای فرضی بر اساس نوع ماهواره انتخابی
        altitude = "418.2 KM" if target == "ISS" else "850.4 KM" if target == "NOAA_19" else "389.1 KM"
        velocity = "7.66 KM/S" if target == "ISS" else "7.41 KM/S" if target == "NOAA_19" else "7.68 KM/S"
        freq = "145.800 MHz (FM)" if target == "ISS" else "137.912 MHz (APT)" if target == "NOAA_19" else "437.550 MHz"

        # رسم ساختار جدول داده‌ها
        pdf.set_fill_color(30, 30, 46)
        pdf.set_text_color(0, 255, 102)
        pdf.set_font("Courier", "B", 10)
        pdf.cell(65, 10, " Telemetry Metric", style="B", fill=True)
        pdf.cell(65, 10, " Resolved Value", style="B", fill=True)
        pdf.cell(60, 10, " Signal Status", style="B", fill=True, ln=1)

        pdf.set_text_color(205, 214, 244)
        pdf.set_font("Courier", size=10)
        metrics = [
            ("Altitude (Perigee)", altitude, "STABLE / LOCKED"),
            ("Orbital Velocity", velocity, "STABLE / INERTIAL"),
            ("Downlink Frequency", freq, "RECEIVING / ACTIVE")
        ]
        
        for metric, val, stat in metrics:
            pdf.cell(65, 8, f" {metric}")
            pdf.cell(65, 8, f" {val}")
            pdf.cell(60, 8, f" {stat}", ln=1)

        pdf.ln(10)
        # باکس هشدار سیگنال
        pdf.set_fill_color(243, 139, 168) # پس زمینه قرمز ملایم برای الرت
        pdf.set_text_color(11, 15, 25)
        pdf.set_font("Courier", "B", 10)
        pdf.cell(0, 8, " [!] OSINT SIGNAL INTERCEPTION NOTE", fill=True, ln=1)
        pdf.set_fill_color(24, 24, 37)
        pdf.set_text_color(243, 139, 168)
        alert_msg = "Satellite is currently in direct Line-of-Sight (LoS) with the ground array. Radio transponders are active and vulnerable to standard SDR capture."
        pdf.multi_cell(0, 6, alert_msg, fill=True)

        # خروجی گرفتن مستقیم به عنوان فایل PDF
        pdf.output("${{ github.workspace }}/sat_output/Satellite_OSINT_Report.pdf")
        print("[+] Elite PDF Report rendered successfully.")
        EOF

        python sat_processor.py

    - name: Archive Direct PDF Report
      uses: actions/upload-artifact@v4
      with:
        name: satellite-intelligence-pdf
        # کلید اصلی حل مشکل: ارجاع مستقیم به خود فایل PDF.
        # گیت‌هاب این را بدون لایه‌های زیپ اضافه و به عنوان تک فایل خروجی می‌دهد.
        path: ${{ github.workspace }}/sat_output/Satellite_OSINT_Report.pdf
